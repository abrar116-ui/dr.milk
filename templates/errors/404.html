<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Dr. Milk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .error-container { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; }
        .error-code { font-size: 80px; font-weight: bold; color: #007bff; margin-bottom: 0; line-height: 1; }
        .error-text { font-size: 24px; color: #333; margin-bottom: 20px; }
        .btn-home { background-color: #007bff; color: white; border-radius: 30px; padding: 10px 30px; font-weight: 500; transition: all 0.3s; }
        .btn-home:hover { background-color: #0056b3; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-text">Milk spilt! This page doesn't exist.</p>
        <p class="text-muted mb-4">We couldn't find the page you're looking for. It might have been moved or deleted.</p>
        <a href="{{ url_for('user.home') }}" class="btn btn-home text-decoration-none">Back to Home</a>
    </div>
</body>
</html>
