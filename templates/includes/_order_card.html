<div class="product-card mb-4 shadow-sm border-0">
    <div class="row g-0">
        <div class="col-md-4 bg-primary p-4 text-white d-flex flex-column justify-content-between rounded-start-4">
            <div>
                <p class="small opacity-75 mb-1 text-uppercase">Delivery Schedule</p>
                <h5 class="mb-3 fw-bold"><i class="bi bi-clock me-2"></i>{{ order.delivery_time }}</h5>
                <p class="small opacity-75 mb-1 text-uppercase">Today's Value</p>
                <h4 class="mb-0 fw-bold">₹{{ order.total_amount }}</h4>
            </div>
            <div class="mt-4">
                <span class="badge rounded-pill bg-accent text-dark px-3 py-2">
                    <i class="bi bi-truck me-1"></i> Active Delivery
                </span>
            </div>
        </div>
        <div class="col-md-8 p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted small">ORDER ID #{{ order.order_id }}</span>
                <span class="product-category fw-bold" style="font-size: 0.75rem;">{{ order.status }}</span>
            </div>

            <div class="order-items-list mb-4">
                {% for item in order.items %}
                <div class="d-flex align-items-center mb-2">
                    <div class="bg-cream rounded-circle p-2 me-3"
                        style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-droplet-half text-primary"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h6 class="mb-0 fw-bold small">{{ item.product.name }}</h6>
                        <p class="small text-muted mb-0">{{ item.size }} &times; {{ item.quantity }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="timeline d-flex justify-content-between px-2">
                <div class="text-center">
                    <div class="timeline-step active small" style="width: 25px; height: 25px;"><i
                            class="bi bi-check"></i></div>
                    <div class="small mt-1 text-muted" style="font-size: 0.6rem;">Placed</div>
                </div>
                <div class="text-center">
                    <div class="timeline-step {{ 'active' if order.status|lower != 'pending' }} small"
                        style="width: 25px; height: 25px;"><i class="bi bi-truck"></i></div>
                    <div class="small mt-1 text-muted" style="font-size: 0.6rem;">On Way</div>
                </div>
                <div class="text-center">
                    <div class="timeline-step small" style="width: 25px; height: 25px;"><i class="bi bi-house"></i>
                    </div>
                    <div class="small mt-1 text-muted" style="font-size: 0.6rem;">Arrived</div>
                </div>
            </div>
        </div>
    </div>
</div>
