<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef5e7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce8c3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="#fefaf0"/>
  
  <!-- Container outline (glass jar) -->
  <path d="M 60 70 L 58 90 Q 58 150 70 165 L 130 165 Q 142 150 142 90 L 140 70 Z" fill="url(#grad4)" stroke="#4a7c4e" stroke-width="2"/>
  
  <!-- Ghee inside -->
  <path d="M 64 100 Q 64 150 72 162 L 128 162 Q 136 150 136 100 Z" fill="#daa520" opacity="0.85"/>
  
  <!-- Ripple effect -->
  <ellipse cx="100" cy="100" rx="35" ry="8" fill="none" stroke="#f0ad4e" stroke-width="1" opacity="0.6"/>
  
  <!-- Jar cap -->
  <rect x="65" y="60" width="70" height="12" fill="#333" rx="2"/>
  <rect x="62" y="55" width="76" height="6" fill="#555" rx="2"/>
  
  <!-- Shine -->
  <ellipse cx="75" cy="95" rx="10" ry="20" fill="white" opacity="0.3"/>
  
  <!-- Text -->
  <text x="100" y="190" font-family="Arial" font-size="12" fill="#2c5f2d" text-anchor="middle" font-weight="bold">COW GHEE</text>
</svg>